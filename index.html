<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Motorola Service Management Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#0f172a;
    font-family:Segoe UI, sans-serif;
}

.hero{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.card-login{
    background:#ffffff;
    border:none;
    border-radius:20px;
    padding:50px;
    width:100%;
    max-width:500px;
    box-shadow:0 20px 50px rgba(0,0,0,.3);
}

.logo{
    font-size:32px;
    font-weight:700;
    color:#0066cc;
}

.subtitle{
    color:#64748b;
}

.btn-motorola{
    background:#0066cc;
    color:white;
    border:none;
}

.btn-motorola:hover{
    background:#0052a3;
    color:white;
}

</style>

</head>

<body>

<div class="hero">

<div class="card-login text-center">

<div class="logo">
Motorola Service Management Portal
</div>

<p class="subtitle mt-3">
Modern Service Management Platform
</p>

<hr>

<div class="mb-3 text-start">
<label class="form-label">Usuario</label>
<input type="text" class="form-control">
</div>

<div class="mb-4 text-start">
<label class="form-label">Contraseña</label>
<input type="password" class="form-control">
</div>

<a href="#" class="btn btn-motorola w-100">
Ingresar
</a>

<div class="mt-4 text-muted">
Version 1.0 Demo
</div>

</div>

</div>

</body>
</html>
